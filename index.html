<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Variares Ticket Transcripts</title>
  <style>
    body {
      background-color: #0d0d0d;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      padding: 60px 20px;
    }
    h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
      background: linear-gradient(90deg, #6b5bff, #8f00ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    p {
      color: #bbb;
      margin-bottom: 40px;
    }
    a {
      color: #8f00ff;
      text-decoration: none;
      border: 1px solid #8f00ff;
      padding: 10px 20px;
      border-radius: 8px;
      transition: 0.2s ease;
    }
    a:hover {
      background-color: #8f00ff;
      color: #fff;
    }
    footer {
      margin-top: 80px;
      font-size: 0.8em;
      color: #555;
    }
  </style>
</head>
<body>
  <h1>Variares Ticket System</h1>
  <p>Welcome to the transcript archive.<br>
  View your ticket records below using their unique ID.</p>

  <a href="/exampleticket123/">🔗 Example Transcript</a>

  <footer>
    Made by Fav_Nonchalant
  </footer>
</body>
</html>
